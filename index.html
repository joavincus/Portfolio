<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J.Vinícius</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <style>
    :root {
      --blue: #0D4AC3;
    }

    mark {
      color: var(--blue);
      background: transparent;
    }

    /* Header */
    .tittle {
      margin-left: 35px;
      @media screen and (max-width: 700px) {
        margin-left: 5px;
      }
    }

    /* MAIN */
    .presentation {
      display: flex;
      align-items: center;
      height: calc(100vh - 140px);
      margin: 0px 55px 0px 55px;
      border-radius: 15px;
      margin-bottom: -10px;

      @media screen and (max-width: 700px) {
        flex-direction: column;
        height: 120vh;
        margin: 100px 0px 0px 0px;
      }
    }

    .presentation-text {
      text-align: start;
      font-size: 2.1em;
      width: 55%;
      flex-wrap: wrap;

      @media screen and (max-width: 700px) {
        width: 90%;
        text-align: center;
        justify-content: center;
        align-items: center;
      }
    }

    .presentation-text-tittle {
      margin-bottom: 18px;
    }

    .presentation-paragraph::after {
      content: '|';
      margin-left: 5px;
      opacity: 1;
      animation: pisca .9s infinite;
    }

    .circle {
      border-radius: 100%;
      width: 300px;
      height: 300px;
      opacity: .8;
      margin-left: 10vw;
      background: linear-gradient(to bottom, #bbdefb, #2196f3, #0d47a1);

      @media screen and (max-width: 600px) {
        margin: auto;
        margin-top: 50px;
        display: none;
      }
    }

    #circle-mb {
      display: none;
      margin-bottom: 30px;

      @media screen and (max-width: 600px) {
        display: block;
      }
    }

    @keyframes pisca {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0;
      }
    }

    .botoes {
      transition: 0.3s ease-in-out;
      opacity: 0;
    }

    .btn:focus {
      color: white;
      background-color: var(--blue);
    }

    .dropdown-menu {
      border: none;
    }

    .dropdown-item {
      transition: 0.2s ease-in;
      padding: 20px;
      border-radius: 5px;
    }

    .dropdown-item:hover {
      scale: 1.03;
      color: white;
      background-color: var(--blue);
    }

    .offcanvas-title {
      font-weight: 500;
      color: var(--blue);
      font-size: 1em;
    }

    .tittle-toggle {
      color: var(--blue);
      font-size: 1.1em;
      font-weight: 500;
    }

    .bi {
      margin-right: 10px;
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <header>
    <nav class="navbar my-3 mb-5">
      <div class="container-fluid">
        <a class="navbar-brand text-primary-emphasis tittle" href="#"><mark>Portfólio</mark> | J.Vinícius</a>

        <!-- Toggle só em telas menores que md -->
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation" style="box-shadow: none !important;">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
          <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasNavbarLabel">
              <i class="bi bi-person-circle"></i>ÁREA DO CLIENTE
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
          </div>
          <div class="offcanvas-body">
            <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
              <li><a class="dropdown-item" href="#"><i class="bi bi-code-slash"></i> SITES & SOFTWARES</a></li>
              <hr>
              <li><a class="dropdown-item" href="#"><i class="bi bi-gear"></i>HARDWARES</a></li>
              <hr>
              <li><a class="dropdown-item" href="#"><i class="bi bi-rocket-takeoff"></i> AUTOMAÇÕES</a></li>
            </ul>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <div class="presentation">
      <div class="presentation-text">
        <h2 class="presentation-text-tittle"><mark>Desenvolvedor Web</mark></h2>
        <h2 class="presentation-paragraph">Apaixonado por tecnologia, atuo nas áreas de Desenvolvimento Web e Internet das Coisas (IoT), criando soluções que conectam o digital ao físico.</h2>
        <div class="circle" id="circle-mb"></div>
        <button type="button" class="btn active botoes">Sobre mim</button>
        <button type="button" class="btn active botoes">Tecnologias</button>
        <button type="button" class="btn active botoes">Trabalhos</button>
      </div>
      <div class="circle"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>

  <script>
    // Máquina de escrever
    function typeWriter(elemento) {
      const textoArray = elemento.innerHTML.split('');
      elemento.innerHTML = '';
      textoArray.forEach((letra, i) => {
        setTimeout(() => elemento.innerHTML += letra, 40 * i);
      });
    }

    const textAboutMe = document.querySelector(".presentation-paragraph");
    typeWriter(textAboutMe);

    // Surgimento dos botões
    const botoes = document.querySelectorAll(".botoes");
    setTimeout(() => {
      botoes.forEach(botao => {
        botao.style.opacity = 1;
      });
    }, 45 * 143);
  </script>
</body>
</html>
